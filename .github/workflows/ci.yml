name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  # -------------------------------------------------------------------------
  # Job 1: lint + hermetic suite (no model required, always fast)
  # -------------------------------------------------------------------------
  lint-and-test:
    name: Lint + hermetic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Hermetic test suite (no model)
        run: pytest -q

  # -------------------------------------------------------------------------
  # Job 2: real-model integration tests
  # Exports yolo11n.onnx once; caches it so the ~2 GB base-weight download
  # is not repeated on every run.
  # -------------------------------------------------------------------------
  integration:
    name: Real-model integration tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev + export dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,export]"

      - name: Cache exported ONNX model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/yolo11n.onnx
          # v1 prefix allows manual cache invalidation; hashes cover export logic + deps.
          key: model-yolo11n-v1-${{ hashFiles('scripts/export_model.py', 'pyproject.toml') }}

      - name: Export model (cache miss only)
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: python scripts/export_model.py --model yolo11n --out models/yolo11n.onnx

      - name: Run integration tests
        run: pytest -m integration -v
        env:
          MODEL_PATH: models/yolo11n.onnx
          GATEWAY_API_KEY: ci-test-key-not-a-real-secret
